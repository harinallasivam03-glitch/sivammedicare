<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Doctor Login</title>

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#020617;
color:white;
display:flex;
min-height:100vh;
}

/* SIDEBAR */

.sidebar{
width:270px;
background:#0f172a;
padding:20px;
position:fixed;
left:0;
top:0;
height:100vh;
}

.logo{
font-size:24px;
font-weight:bold;
color:white;
margin-bottom:40px;
}

.logo span{
color:#38bdf8;
}

.sidebar a{
display:flex;
align-items:center;
gap:12px;
text-decoration:none;
color:white;
padding:15px;
border-radius:12px;
margin-bottom:12px;
transition:.3s;
font-size:16px;
}

.sidebar a:hover,
.sidebar a.active{
background:#38bdf8;
}

/* CONTENT */

.content{
margin-left:270px;
width:100%;
padding:35px;
}

.title{
text-align:center;
font-size:40px;
color:#38bdf8;
margin-bottom:30px;
}

/* CARDS */

.cards{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:20px;
margin-bottom:30px;
}

.card{
background:#111827;
padding:25px;
border-radius:18px;
text-align:center;
box-shadow:0 0 20px rgba(56,189,248,.15);
}

.card i{
font-size:40px;
color:#38bdf8;
margin-bottom:10px;
}

.card h2{
font-size:30px;
}

.card p{
color:#cbd5e1;
}

/* SECTION */

.section{
background:#111827;
padding:25px;
border-radius:20px;
margin-bottom:30px;
box-shadow:0 0 20px rgba(56,189,248,.15);
}

.section h2{
color:#38bdf8;
margin-bottom:20px;
}

/* LOGIN */

.login-box{
max-width:600px;
margin:auto;
}

input,
button{
width:100%;
padding:14px;
border:none;
border-radius:10px;
font-size:15px;
margin-bottom:15px;
}

input{
background:#1e293b;
color:white;
outline:none;
}

button{
background:#38bdf8;
color:white;
cursor:pointer;
transition:.3s;
}

button:hover{
background:#0ea5e9;
}

.error{
color:#ef4444;
text-align:center;
display:none;
}

/* DOCTOR & NURSE LIST */

.staff-grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:20px;
}

.staff-card{
background:#0f172a;
padding:20px;
border-radius:15px;
border-left:4px solid #38bdf8;
}

.staff-card h3{
color:#38bdf8;
text-transform:capitalize;
margin-bottom:10px;
}

.staff-card p{
color:#cbd5e1;
margin:6px 0;
}

/* MOBILE */

@media(max-width:900px){

.sidebar{
width:80px;
padding:15px 10px;
}

.logo{
font-size:12px;
text-align:center;
}

.sidebar a{
font-size:0;
justify-content:center;
}

.sidebar a i{
font-size:18px;
}

.content{
margin-left:80px;
padding:20px;
}

.title{
font-size:28px;
}

}
</style>
</head>

<body>

<!-- SIDEBAR -->

<div class="sidebar">

<div class="logo">
Sivam<span>Medicare</span>
</div>

<a href="hos-index.html">
<i class="fas fa-home"></i>
Home
</a>

<a href="hos-service.html">
<i class="fas fa-stethoscope"></i>
Services
</a>

<a href="hos-doctor-login.html" class="active">
<i class="fas fa-user-doctor"></i>
Doctor Login
</a>

<a href="hos-patients.html">
<i class="fas fa-hospital-user"></i>
Patients
</a>

<a href="hos-appointment.html">
<i class="fas fa-calendar-check"></i>
Appointment
</a>

<a href="hos-admin.html">
<i class="fas fa-lock"></i>
Admin Panel
</a>

</div>

<!-- CONTENT -->

<div class="content">

<h1 class="title">Doctor Login Dashboard</h1>

<!-- CARDS -->

<div class="cards">

<div class="card">
<i class="fas fa-user-doctor"></i>
<h2 id="doctorCount">0</h2>
<p>Total Doctors</p>
</div>

<div class="card">
<i class="fas fa-user-nurse"></i>
<h2 id="nurseCount">0</h2>
<p>Total Nurses</p>
</div>

</div>

<!-- LOGIN SECTION -->

<div class="section">

<h2>Doctor Login</h2>

<div class="login-box">

<input type="text" id="doctorId" placeholder="Doctor ID">

<input type="text" id="doctorName" placeholder="Doctor Name">

<input type="password" id="doctorPassword" placeholder="Password">

<button onclick="doctorLogin()">
Login
</button>

<p class="error" id="errorMsg">
Wrong Login Details
</p>

</div>

</div>

<!-- AVAILABLE DOCTORS -->

<div class="section">

<h2>Available Doctors</h2>

<div class="staff-grid" id="doctorList"></div>

</div>

<!-- AVAILABLE NURSES -->

<div class="section">

<h2>Available Nurses</h2>

<div class="staff-grid" id="nurseList"></div>

</div>

</div>

<script>

/* DEFAULT DOCTORS */

let defaultDoctors = [
{
id:"SM101",
name:"dr sivam",
password:"1234",
department:"Cardiology"
},
{
id:"SM102",
name:"dr arun",
password:"5678",
department:"Neurology"
},
{
id:"SM103",
name:"dr priya",
password:"9999",
department:"Pediatrics"
}
];

/* DEFAULT NURSES */

let defaultNurses = [
{
id:"NR101",
name:"nurse meena",
ward:"Emergency"
},
{
id:"NR102",
name:"nurse kavitha",
ward:"ICU"
}
];

/* LOCAL STORAGE */

let doctors =
JSON.parse(localStorage.getItem("doctors"));

if(!doctors){
doctors = defaultDoctors;
localStorage.setItem("doctors", JSON.stringify(doctors));
}

let nurses =
JSON.parse(localStorage.getItem("nurses"));

if(!nurses){
nurses = defaultNurses;
localStorage.setItem("nurses", JSON.stringify(nurses));
}

/* LOAD COUNTS */

function loadCounts(){

document.getElementById("doctorCount").innerText =
doctors.length;

document.getElementById("nurseCount").innerText =
nurses.length;

}

/* LOAD DOCTOR LIST */

function loadDoctors(){

let doctorList =
document.getElementById("doctorList");

doctorList.innerHTML = "";

doctors.forEach(doc => {

doctorList.innerHTML += `
<div class="staff-card">
<h3>
<i class="fas fa-user-doctor"></i>
${doc.name}
</h3>

<p><b>ID:</b> ${doc.id}</p>

<p><b>Department:</b> ${doc.department || "General"}</p>
</div>
`;

});

}

/* LOAD NURSE LIST */

function loadNurses(){

let nurseList =
document.getElementById("nurseList");

nurseList.innerHTML = "";

nurses.forEach(nurse => {

nurseList.innerHTML += `
<div class="staff-card">
<h3>
<i class="fas fa-user-nurse"></i>
${nurse.name}
</h3>

<p><b>ID:</b> ${nurse.id}</p>

<p><b>Ward:</b> ${nurse.ward}</p>
</div>
`;

});

}

/* LOGIN */

function doctorLogin(){

let id =
document.getElementById("doctorId").value.trim();

let name =
document.getElementById("doctorName").value.trim().toLowerCase();

let pass =
document.getElementById("doctorPassword").value.trim();

let found =
doctors.find(doc =>
doc.id === id &&
doc.name.toLowerCase() === name &&
doc.password === pass
);

if(found){

localStorage.setItem(
"currentDoctor",
JSON.stringify(found)
);

window.location.href = "doctor-dashboard.html";

}else{

document.getElementById("errorMsg").style.display =
"block";

}

}

loadCounts();
loadDoctors();
loadNurses();

</script>

</body>
</html>
