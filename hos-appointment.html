<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Book Appointment</title>

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#020617;
color:white;
display:flex;
min-height:100vh;
}

/* SIDEBAR */

.sidebar{
width:270px;
background:#0f172a;
padding:20px;
position:fixed;
left:0;
top:0;
height:100vh;
}

.logo{
font-size:24px;
font-weight:bold;
margin-bottom:40px;
}

.logo span{
color:#38bdf8;
}

.sidebar a{
display:flex;
align-items:center;
gap:12px;
text-decoration:none;
color:white;
padding:15px;
border-radius:12px;
margin-bottom:12px;
transition:.3s;
font-size:16px;
}

.sidebar a:hover,
.sidebar a.active{
background:#38bdf8;
}

/* CONTENT */

.content{
margin-left:270px;
width:100%;
padding:35px;
}

.title{
text-align:center;
font-size:40px;
color:#38bdf8;
margin-bottom:30px;
}

/* CARDS */

.cards{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:20px;
margin-bottom:30px;
}

.card{
background:#111827;
padding:25px;
border-radius:18px;
text-align:center;
box-shadow:0 0 20px rgba(56,189,248,.15);
}

.card i{
font-size:40px;
color:#38bdf8;
margin-bottom:10px;
}

.card h2{
font-size:30px;
}

.card p{
color:#cbd5e1;
}

/* SECTION */

.section{
background:#111827;
padding:25px;
border-radius:20px;
margin-bottom:30px;
box-shadow:0 0 20px rgba(56,189,248,.15);
}

.section h2{
color:#38bdf8;
margin-bottom:20px;
}

/* FORM */

.form-grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:15px;
}

input,
select,
textarea,
button{
width:100%;
padding:14px;
border:none;
border-radius:10px;
font-size:15px;
}

input,
select,
textarea{
background:#1e293b;
color:white;
outline:none;
}

textarea{
height:120px;
resize:none;
margin-top:15px;
}

button{
background:#38bdf8;
color:white;
cursor:pointer;
transition:.3s;
margin-top:15px;
}

button:hover{
background:#0ea5e9;
}

/* DOCTOR COUNT */

.doctor-count-grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:20px;
}

.doctor-box{
background:#0f172a;
padding:20px;
border-radius:15px;
}

.doctor-box h3{
color:#38bdf8;
margin-bottom:15px;
text-transform:capitalize;
}

.count-box{
background:#1e293b;
padding:25px;
border-radius:12px;
text-align:center;
border-left:4px solid #38bdf8;
}

.count-box h1{
font-size:45px;
color:#38bdf8;
}

.count-box p{
color:#cbd5e1;
}

/* MOBILE */

@media(max-width:900px){

.sidebar{
width:80px;
padding:15px 10px;
}

.logo{
font-size:12px;
text-align:center;
}

.sidebar a{
font-size:0;
justify-content:center;
}

.sidebar a i{
font-size:18px;
}

.content{
margin-left:80px;
padding:20px;
}

.title{
font-size:28px;
}

}
</style>
</head>

<body>

<script>
if(localStorage.getItem("websiteAccess") !== "true"){
    window.location.href = "login.html";
}
</script>

<div class="sidebar">

<div class="logo">Sivam<span>Medicare</span></div>

<a href="hos-index.html">
<i class="fas fa-home"></i>
Home
</a>

<a href="hos-service.html">
<i class="fas fa-stethoscope"></i>
Services
</a>

<a href="hos-doctor-login.html">
<i class="fas fa-user-doctor"></i>
Doctor Login
</a>

<a href="hos-patients.html">
<i class="fas fa-hospital-user"></i>
Patients
</a>

<a href="hos-appointment.html" class="active">
<i class="fas fa-calendar-check"></i>
Appointment
</a>

<a href="hos-admin.html">
<i class="fas fa-lock"></i>
Admin Panel
</a>

</div>

<div class="content">

<h1 class="title">Appointment Dashboard</h1>

<div class="cards">

<div class="card">
<i class="fas fa-calendar-check"></i>
<h2 id="totalAppointmentCount">0</h2>
<p>Total Appointments</p>
</div>

<div class="card">
<i class="fas fa-user-doctor"></i>
<h2 id="doctorCount">0</h2>
<p>Total Doctors</p>
</div>

</div>

<div class="section">

<h2>Book Appointment</h2>

<form onsubmit="bookAppointment(event)">

<div class="form-grid">

<input type="text" id="patientName" placeholder="Patient Name" required>

<input type="tel" id="patientPhone" placeholder="Phone Number" required>

<select id="doctorName" required>
<option value="">Select Doctor</option>
</select>

<input type="date" id="appointmentDate" required>

</div>

<textarea id="problem" placeholder="Describe Problem" required></textarea>

<button type="submit">
Book Appointment
</button>

</form>

</div>

<div class="section">

<h2>Doctor Wise Appointment Count</h2>

<div class="doctor-count-grid" id="appointmentList"></div>

</div>

</div>

<script>

let defaultDoctors = [
{
id:"SM101",
name:"dr sivam",
password:"1234",
department:"Cardiology"
},
{
id:"SM102",
name:"dr arun",
password:"5678",
department:"Neurology"
},
{
id:"SM103",
name:"dr priya",
password:"9999",
department:"Pediatrics"
}
];

let doctors =
JSON.parse(localStorage.getItem("doctors"));

if(!doctors){
doctors = defaultDoctors;
localStorage.setItem("doctors", JSON.stringify(doctors));
}

function loadDoctorOptions(){

let doctorSelect =
document.getElementById("doctorName");

doctorSelect.innerHTML =
`<option value="">Select Doctor</option>`;

doctors.forEach(doc => {

doctorSelect.innerHTML += `
<option value="${doc.name}">
${doc.name} - ${doc.department || "General"}
</option>
`;

});

document.getElementById("doctorCount").innerText =
doctors.length;

}

function loadAppointments(){

let appointments =
JSON.parse(localStorage.getItem("appointments")) || [];

document.getElementById("totalAppointmentCount").innerText =
appointments.length;

let appointmentList =
document.getElementById("appointmentList");

appointmentList.innerHTML = "";

doctors.forEach(doc => {

let doctorAppointments =
appointments.filter(app =>
app.doctor === doc.name
);

appointmentList.innerHTML += `
<div class="doctor-box">

<h3>
<i class="fas fa-user-doctor"></i>
${doc.name} - ${doc.department || "General"}
</h3>

<div class="count-box">
<h1>${doctorAppointments.length}</h1>
<p>Appointments Booked</p>
</div>

</div>
`;

});

}

function bookAppointment(event){

event.preventDefault();

let patient =
document.getElementById("patientName").value;

let phone =
document.getElementById("patientPhone").value;

let doctor =
document.getElementById("doctorName").value;

let date =
document.getElementById("appointmentDate").value;

let problem =
document.getElementById("problem").value;

let appointment = {
patient:patient,
phone:phone,
doctor:doctor,
date:date,
problem:problem,
status:"Booked"
};

let appointments =
JSON.parse(localStorage.getItem("appointments")) || [];

appointments.push(appointment);

localStorage.setItem(
"appointments",
JSON.stringify(appointments)
);

loadAppointments();

alert("Appointment Booked Successfully");

event.target.reset();

}

loadDoctorOptions();
loadAppointments();

</script>

</body>
</html>
