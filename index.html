<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Sivam Medicare - Home</title>

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#020617;
color:white;
display:flex;
min-height:100vh;
overflow-x:hidden;
}

.sidebar{
width:270px;
background:#0f172a;
padding:20px;
position:fixed;
left:0;
top:0;
height:100vh;
z-index:1000;
border-right:1px solid rgba(255,255,255,.05);
}

.logo{
font-size:24px;
font-weight:bold;
margin-bottom:40px;
text-align:center;
}

.logo span{
color:#38bdf8;
}

.sidebar a{
display:flex;
align-items:center;
gap:12px;
text-decoration:none;
color:white;
padding:15px;
border-radius:12px;
margin-bottom:12px;
transition:.3s;
font-size:16px;
background:#111827;
}

.sidebar a:hover,
.sidebar a.active{
background:#38bdf8;
}

.content{
margin-left:270px;
width:calc(100% - 270px);
}

.hero{
min-height:100vh;
background:
linear-gradient(rgba(0,0,0,.72),rgba(0,0,0,.72)),
url('https://images.unsplash.com/photo-1586773860418-d37222d8fce3?q=80&w=1200&auto=format&fit=crop')
center/cover no-repeat;
display:flex;
justify-content:center;
align-items:center;
text-align:center;
padding:25px;
}

.hero-content{
max-width:850px;
}

.hero h1{
font-size:65px;
margin-bottom:20px;
line-height:1.2;
}

.hero p{
font-size:22px;
color:#cbd5e1;
line-height:1.7;
margin-bottom:30px;
}

.hero-buttons{
display:flex;
justify-content:center;
gap:20px;
flex-wrap:wrap;
}

.hero button{
padding:15px 35px;
border:none;
border-radius:12px;
font-size:18px;
cursor:pointer;
transition:.3s;
font-weight:bold;
}

.book-btn{
background:#38bdf8;
color:white;
}

.service-btn{
background:#111827;
color:white;
border:1px solid #38bdf8;
}

.book-btn:hover,
.service-btn:hover{
background:#0ea5e9;
transform:translateY(-3px);
}

/* TABLET */

@media(max-width:900px){

.sidebar{
width:80px;
padding:15px 10px;
}

.logo{
font-size:12px;
}

.sidebar a{
font-size:0;
justify-content:center;
padding:15px 10px;
}

.sidebar a i{
font-size:20px;
}

.content{
margin-left:80px;
width:calc(100% - 80px);
}

.hero h1{
font-size:38px;
}

.hero p{
font-size:18px;
}

}

/* MOBILE */

@media(max-width:600px){

body{
display:block;
}

.sidebar{
width:100%;
height:70px;
position:fixed;
top:auto;
bottom:0;
left:0;
display:flex;
align-items:center;
justify-content:space-around;
padding:6px;
border-right:none;
border-top:1px solid rgba(255,255,255,.1);
overflow:hidden;
}

.logo{
display:none;
}

.sidebar a{
margin:0;
padding:10px;
font-size:0;
justify-content:center;
background:transparent;
}

.sidebar a i{
font-size:20px;
}

.content{
margin-left:0;
width:100%;
}

.hero{
min-height:100vh;
padding:25px 15px 95px;
}

.hero h1{
font-size:33px;
}

.hero p{
font-size:16px;
line-height:1.6;
}

.hero-buttons{
flex-direction:column;
gap:15px;
}

.hero button{
width:100%;
font-size:16px;
padding:14px;
}

}

</style>
</head>

<body>

<div class="sidebar">

<div class="logo">
Sivam<span>Medicare</span>
</div>

<a href="index.html" class="active">
<i class="fa-solid fa-house"></i>
Home
</a>

<a href="service.html">
<i class="fa-solid fa-stethoscope"></i>
Services
</a>

<a href="doctor-login.html">
<i class="fa-solid fa-user-doctor"></i>
Doctor Login
</a>

<a href="patients.html">
<i class="fas fa-hospital-user"></i>
Patients
</a>

<a href="appointment.html">
<i class="fa-solid fa-calendar-check"></i>
Appointment
</a>

<a href="pharmacy.html">
<i class="fas fa-pills"></i>
Pharmacy
</a>

<a href="admin.html">
<i class="fa-solid fa-lock"></i>
Admin Panel
</a>

</div>

<div class="content">

<section class="hero">

<div class="hero-content">

<h1>Welcome To Sivam Medicare</h1>

<p>
24/7 Emergency Services With Experienced Doctors,
Advanced ICU Care, Modern Treatments,
Trusted Medical Support And Patient Friendly Care.
</p>

<div class="hero-buttons">

<button class="book-btn"
onclick="window.location.href='appointment.html'">
Book Appointment
</button>

<button class="service-btn"
onclick="window.location.href='patients.html'">
Admission Room
</button>

</div>

</div>

</section>

</div>

</body>
</html>
